name: carelink
description: A mobile app for Northampton Council to manage non-emergency welfare check-ins for vulnerable residents.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  provider: ^6.0.0

  # Database
  sqflite: ^2.3.0
  sqflite_common_ffi: ^2.3.0
  path_provider: ^2.1.0

  # Authentication & Security
  crypto: ^3.0.0
  uuid: ^4.0.0

  # Date & Time
  intl: ^0.19.0

  # HTTP (for future API integration)
  http: ^1.1.0

  # Responsive UI
  flutter_screenutil: ^5.9.0

  # Notifications
  flutter_local_notifications: ^14.0.0

  # Local Storage
  shared_preferences: ^2.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  # Assets (optional - can add images/icons later)
  # assets:
  #   - assets/
  #   - assets/images/
  #   - assets/icons/

  # Fonts (optional - can add custom fonts)
  # fonts:
  #   - family: CustomFont
  #     fonts:
  #       - asset: assets/fonts/CustomFont-Regular.ttf
